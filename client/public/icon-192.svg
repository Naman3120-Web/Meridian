<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" fill="#0f172a" rx="45"/>
  
  <!-- Gradient for compass -->
  <defs>
    <linearGradient id="compassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Compass circle -->
  <circle cx="96" cy="96" r="75" fill="url(#compassGrad)"/>
  
  <!-- Cardinal directions -->
  <text x="96" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="white">N</text>
  <text x="157" y="99" text-anchor="middle" font-size="18" font-weight="bold" fill="white">E</text>
  <text x="96" y="162" text-anchor="middle" font-size="18" font-weight="bold" fill="white">S</text>
  <text x="35" y="99" text-anchor="middle" font-size="18" font-weight="bold" fill="white">W</text>
  
  <!-- North arrow pointing up -->
  <path d="M 96 50 L 85 75 L 96 70 L 107 75 Z" fill="#fbbf24"/>
  
  <!-- Center dot -->
  <circle cx="96" cy="96" r="8" fill="white"/>
</svg>
