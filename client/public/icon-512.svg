<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#0f172a" rx="120"/>
  
  <!-- Gradient for compass -->
  <defs>
    <linearGradient id="compassGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Compass circle -->
  <circle cx="256" cy="256" r="200" fill="url(#compassGrad512)"/>
  
  <!-- Cardinal directions -->
  <text x="256" y="110" text-anchor="middle" font-size="48" font-weight="bold" fill="white">N</text>
  <text x="420" y="265" text-anchor="middle" font-size="48" font-weight="bold" fill="white">E</text>
  <text x="256" y="420" text-anchor="middle" font-size="48" font-weight="bold" fill="white">S</text>
  <text x="92" y="265" text-anchor="middle" font-size="48" font-weight="bold" fill="white">W</text>
  
  <!-- North arrow pointing up -->
  <path d="M 256 130 L 230 200 L 256 185 L 282 200 Z" fill="#fbbf24"/>
  
  <!-- Center dot -->
  <circle cx="256" cy="256" r="20" fill="white"/>
</svg>
